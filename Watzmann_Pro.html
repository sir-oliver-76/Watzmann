<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<title>Watzmann Pro+</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { margin:0; font-family: -apple-system, Arial; }

/* MAP /
#map { height: 100vh; }

/ TOP CONTROL BAR /
#controls {
  position: absolute;
  top: 10px;
  left: 10px;
  right: 10px;
  z-index: 1000;
  display: flex;
  gap: 10px;
}

button {
  flex: 1;
  padding: 14px;
  font-size: 16px;
  border-radius: 12px;
  border: none;
  background: #1e88e5;
  color: white;
}

/ PANEL /
#panel {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 45%;
  background: white;
  border-top-left-radius: 16px;
  border-top-right-radius: 16px;
  overflow: auto;
  padding: 15px;
}

/ TABS /
.tabs {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}

.tab {
  flex:1;
  padding:10px;
  text-align:center;
  border-radius:10px;
  background:#ddd;
}

.tab.active {
  background:#1e88e5;
  color:white;
}

/ CHECKLIST */
.checklist label {
  display:block;
  padding:8px;
  font-size:16px;
}

</style>
</head>

<body>

<div id="controls">
  <button onclick="toggle('stages')">Etappen</button>
  <button onclick="toggle('huts')">Hütten</button>
  <button onclick="toggle('hazards')">Gefahren</button>
  <button onclick="locate()">📍</button>
</div>

<div id="map"></div>

<div id="panel">
  <div class="tabs">
    <div class="tab active" onclick="switchUser('oliver')">Oliver</div>
    <div class="tab" onclick="switchUser('martin')">Martin</div>
  </div>

  <div id="checklist" class="checklist"></div>
</div>

<script>

// MAP
var map = L.map('map').setView([47.55, 12.92], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);

// LAYERS
var layers = {
  stages: L.layerGroup().addTo(map),
  huts: L.layerGroup().addTo(map),
  hazards: L.layerGroup().addTo(map)
};

// TOGGLE
function toggle(name){
  map.hasLayer(layers[name]) ? map.removeLayer(layers[name]) : map.addLayer(layers[name]);
}

// GPS
function locate(){
  map.locate({setView:true});
}

// ETAPPEN
L.marker([47.57,12.92]).addTo(layers.stages).bindPopup("Etappe 1");
L.marker([47.55,12.94]).addTo(layers.stages).bindPopup("Etappe 2");
L.marker([47.52,12.96]).addTo(layers.stages).bindPopup("Etappe 3");

// HÜTTEN
L.marker([47.56,12.91]).addTo(layers.huts).bindPopup("Watzmannhaus");
L.marker([47.52,12.96]).addTo(layers.huts).bindPopup("Kärlingerhaus");

// GEFAHREN
L.circleMarker([47.54,12.93]).addTo(layers.hazards).bindPopup("Steinschlag");

// =====================
// PACKLISTE
// =====================

var items = [
"Rucksack",
"Wasser (2L)",
"Regenjacke",
"Warme Kleidung",
"Stirnlampe",
"Oropax",
"Hüttenschlafsack",
"Snacks",
"Sonnencreme",
"Erste Hilfe"
];

var currentUser = "oliver";

function switchUser(user){
  currentUser = user;

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  event.target.classList.add("active");

  renderChecklist();
}

function renderChecklist(){
  var container = document.getElementById("checklist");
  container.innerHTML = "";

  items.forEach(item=>{
    var key = currentUser + "_" + item;

    var checked = localStorage.getItem(key) === "true";

    var el = document.createElement("label");
    el.innerHTML =       <input type="checkbox" ${checked ? "checked":""}        onchange="localStorage.setItem('${key}', this.checked)">       ${item}    ;
    container.appendChild(el);
  });
}

renderChecklist();

</script>

</body>
</html>
