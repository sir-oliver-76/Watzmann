<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<title>Watzmann Pro Stable</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { margin:0; font-family: -apple-system, Arial; }

/* MAP /
#map { height: 100vh; }

/ BUTTON BAR /
#controls {
  position: absolute;
  top: 10px;
  left: 10px;
  right: 10px;
  z-index: 1000;
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

button {
  flex: 1 1 45%;
  padding: 16px;
  font-size: 18px;
  border-radius: 14px;
  border: none;
  background: #1565c0;
  color: white;
}

/ PANEL /
#panel {
  position: absolute;
  bottom: -100%;
  left: 0;
  right: 0;
  height: 50%;
  background: white;
  border-top-left-radius: 16px;
  border-top-right-radius: 16px;
  transition: 0.3s;
  padding: 15px;
  overflow: auto;
}

#panel.active {
  bottom: 0;
}

/ TABS /
.tabs {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}

.tab {
  flex:1;
  padding:12px;
  text-align:center;
  border-radius:10px;
  background:#ccc;
  font-size:16px;
}

.tab.active {
  background:#1565c0;
  color:white;
}

/ CHECKLIST */
.checklist label {
  display:block;
  padding:10px;
  font-size:17px;
}

</style>
</head>

<body>

<div id="controls">
  <button onclick="toggle('stages')">Etappen</button>
  <button onclick="toggle('huts')">Hütten</button>
  <button onclick="toggle('hazards')">Gefahren</button>
  <button onclick="togglePanel()">Packliste</button>
</div>

<div id="map"></div>

<div id="panel">
  <div class="tabs">
    <div class="tab active" onclick="switchUser('oliver', this)">Oliver</div>
    <div class="tab" onclick="switchUser('martin', this)">Martin</div>
  </div>
  <div id="checklist"></div>
</div>

<script>

// ================= MAP =================

// SATELLITE VIEW
var map = L.map('map').setView([47.55, 12.92], 12);

L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png').addTo(map);

// LAYERS
var layers = {
  stages: L.layerGroup().addTo(map),
  huts: L.layerGroup().addTo(map),
  hazards: L.layerGroup().addTo(map)
};

function toggle(name){
  map.hasLayer(layers[name]) ? map.removeLayer(layers[name]) : map.addLayer(layers[name]);
}

// ================= DATA =================

// ETAPPEN
[
  [47.57,12.92,"Etappe 1"],
  [47.55,12.94,"Etappe 2"],
  [47.52,12.96,"Etappe 3"]
].forEach(e=>{
  L.marker([e[0],e[1]]).addTo(layers.stages).bindPopup(e[2]);
});

// HÜTTEN
[
  [47.56,12.91,"Watzmannhaus"],
  [47.52,12.96,"Kärlingerhaus"]
].forEach(h=>{
  L.marker([h[0],h[1]]).addTo(layers.huts).bindPopup(h[2]);
});

// GEFAHREN
L.circleMarker([47.54,12.93]).addTo(layers.hazards).bindPopup("Steinschlag");

// ================= PANEL =================

function togglePanel(){
  document.getElementById("panel").classList.toggle("active");
}

// ================= PACKLIST =================

var items = [
"Rucksack",
"Wasser 2L",
"Regenjacke",
"Warme Kleidung",
"Stirnlampe",
"Oropax",
"Hüttenschlafsack",
"Sonnencreme",
"Snacks",
"Erste Hilfe"
];

var currentUser = "oliver";

function switchUser(user, el){
  currentUser = user;

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");

  renderChecklist();
}

function renderChecklist(){
  var container = document.getElementById("checklist");
  container.innerHTML = "";

  items.forEach(item=>{
    var key = currentUser + "_" + item;
    var checked = localStorage.getItem(key) === "true";

    var label = document.createElement("label");
    label.innerHTML =       <input type="checkbox" ${checked ? "checked":""}>       ${item}    ;

    var checkbox = label.querySelector("input");

    checkbox.addEventListener("change", function(){
      localStorage.setItem(key, this.checked);
    });

    container.appendChild(label);
  });
}

renderChecklist();

</script>

</body>
</html>
